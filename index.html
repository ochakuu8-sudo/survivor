<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <title>夜街サバイバー</title>
    <link rel="icon" href="data:," />
    <link rel="stylesheet" href="src/styles.css" />
  </head>
  <body>
    <main id="app" aria-label="夜街サバイバー">
      <canvas id="game" aria-label="ゲーム画面"></canvas>

      <div id="vignette"></div>
      <div id="hitFlash"></div>

      <section id="hud" aria-live="polite">
        <div class="hud-block">
          <span class="hud-label">夜</span>
          <strong id="waveText">1</strong>
        </div>
        <div class="hud-block wide">
          <span class="hud-label">残り</span>
          <strong id="timeText">00:45</strong>
        </div>
        <div class="hud-meter">
          <span class="hud-label">体力</span>
          <div class="meter-shell"><div id="hpFill" class="meter-fill"></div></div>
          <strong id="hpText" class="hp-text">100/100</strong>
        </div>
        <div class="hud-block">
          <span class="hud-label">コイン</span>
          <strong id="cashText">0</strong>
        </div>
        <div class="hud-block">
          <span class="hud-label">撃破</span>
          <strong id="killText">0</strong>
        </div>
      </section>

      <button id="pauseBtn" type="button" class="pause-button hidden" aria-label="一時停止">II</button>

      <section id="pauseMenu" class="panel narrow hidden" aria-label="一時停止メニュー">
        <span class="panel-kicker">一時停止</span>
        <h1>休憩中</h1>
        <div class="pause-actions">
          <button id="resumeBtn" type="button" class="primary">再開</button>
          <button id="pauseDebugBtn" type="button">デバッグメニュー</button>
          <button id="pauseRestartBtn" type="button">やり直す</button>
        </div>
      </section>

      <section id="starterPick" class="panel narrow hidden" aria-label="開始武器選択">
        <div class="panel-head">
          <div>
            <span class="panel-kicker">最初の武器</span>
            <h1>3つから1つ選んで夜街へ</h1>
          </div>
        </div>
        <div id="starterOffers" class="starter-offers"></div>
      </section>

      <section id="shop" class="panel hidden" aria-label="装備ショップ">
        <div class="panel-head">
          <div>
            <span class="panel-kicker">装備ショップ</span>
            <h1>武器・アタッチメント・倉庫</h1>
          </div>
          <div class="shop-cash">
            <span>コイン</span>
            <strong id="shopCash">0</strong>
          </div>
        </div>

        <div class="shop-tabs" role="tablist">
          <button class="shop-tab shop-tab-active" data-tab="shop" type="button" role="tab" aria-selected="true">ショップ</button>
          <button class="shop-tab" data-tab="inventory" type="button" role="tab" aria-selected="false">倉庫</button>
        </div>

        <div class="shop-tab-panels">
          <div class="shop-tab-panel" data-panel="shop" role="tabpanel">
            <div id="offers" class="offers"></div>
          </div>
          <div class="shop-tab-panel shop-tab-panel-hidden" data-panel="inventory" role="tabpanel">
            <div id="gearInventory" class="gear-inventory"></div>
          </div>
        </div>

        <div class="shop-actions">
          <button id="rerollBtn" type="button">リロール</button>
          <button id="nextWaveBtn" type="button" class="primary">次の夜へ</button>
        </div>
      </section>

      <section id="gameOver" class="panel narrow hidden" aria-label="ゲームオーバー">
        <span class="panel-kicker">ラン終了</span>
        <h1>通りが静まり返った</h1>
        <p id="resultText"></p>
        <button id="restartBtn" type="button" class="primary">やり直す</button>
      </section>

      <div id="touchControls" aria-hidden="true">
        <div id="moveStick" class="stick">
          <div id="moveThumb" class="stick-thumb"></div>
        </div>
      </div>

      <aside id="debugPanel" class="hidden" aria-label="デバッグメニュー">
        <div class="debug-head">
          <strong>DEBUG</strong>
          <small>~ で開閉</small>
          <button id="dbgClose" type="button">閉じる</button>
        </div>
        <div class="debug-row">
          <label>武器</label>
          <select id="dbgWeaponSel"></select>
          <button id="dbgWeaponEquip" type="button">装備</button>
        </div>
        <div class="debug-row">
          <label>アタッチ</label>
          <select id="dbgAttSel"></select>
        </div>
        <div class="debug-row">
          <label>装備先</label>
          <select id="dbgAttWeapon"></select>
          <button id="dbgAttApply" type="button">装着</button>
        </div>
        <div class="debug-row">
          <label>敵</label>
          <select id="dbgEnemySel">
            <option value="walker">ゾンビ歩</option>
            <option value="runner">ゾンビ走</option>
            <option value="orc">オーク</option>
            <option value="archer">スケルトン</option>
          </select>
          <button id="dbgEnemySpawn" type="button">出現</button>
        </div>
        <div class="debug-row debug-actions">
          <button id="dbgMoney" type="button">+100</button>
          <button id="dbgHeal" type="button">回復</button>
          <button id="dbgKillAll" type="button">全滅</button>
          <button id="dbgInvuln" type="button">無敵 OFF</button>
        </div>
        <div class="debug-row debug-actions">
          <button id="dbgShop" type="button">ショップ</button>
          <button id="dbgNextWave" type="button">次夜</button>
        </div>
      </aside>
    </main>

    <script type="module" src="src/main.js"></script>
  </body>
</html>
