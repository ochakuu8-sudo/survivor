<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <title>夜街サバイバー</title>
    <link rel="icon" href="data:," />
    <link rel="stylesheet" href="src/styles.css" />
  </head>
  <body>
    <main id="app" aria-label="夜街サバイバー">
      <canvas id="game" aria-label="ゲーム画面"></canvas>

      <div id="vignette"></div>
      <div id="hitFlash"></div>

      <section id="hud" aria-live="polite">
        <div class="hud-block">
          <span class="hud-label">夜</span>
          <strong id="waveText">1</strong>
        </div>
        <div class="hud-block wide">
          <span class="hud-label">残り</span>
          <strong id="timeText">00:45</strong>
        </div>
        <div class="hud-meter">
          <span class="hud-label">体力</span>
          <div class="meter-shell"><div id="hpFill" class="meter-fill"></div></div>
        </div>
        <div class="hud-block">
          <span class="hud-label">コイン</span>
          <strong id="cashText">0</strong>
        </div>
        <div class="hud-block">
          <span class="hud-label">撃破</span>
          <strong id="killText">0</strong>
        </div>
      </section>

      <section id="shop" class="panel hidden" aria-label="装備ショップ">
        <div class="panel-head">
          <div>
            <span class="panel-kicker">装備ショップ</span>
            <h1>武器・アタッチメント・レリック</h1>
          </div>
          <div class="shop-cash">
            <span>コイン</span>
            <strong id="shopCash">0</strong>
          </div>
        </div>

        <div id="offers" class="offers"></div>

        <div class="shop-footer">
          <div id="gearInventory" class="gear-inventory"></div>
          <div class="shop-actions">
            <button id="rerollBtn" type="button">リロール</button>
            <button id="nextWaveBtn" type="button" class="primary">次の夜へ</button>
          </div>
        </div>
      </section>

      <section id="gameOver" class="panel narrow hidden" aria-label="ゲームオーバー">
        <span class="panel-kicker">ラン終了</span>
        <h1>通りが静まり返った</h1>
        <p id="resultText"></p>
        <button id="restartBtn" type="button" class="primary">やり直す</button>
      </section>

      <div id="touchControls" aria-hidden="true">
        <div id="moveStick" class="stick">
          <div id="moveThumb" class="stick-thumb"></div>
        </div>
      </div>
    </main>

    <script type="module" src="src/main.js"></script>
  </body>
</html>
