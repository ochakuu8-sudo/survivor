<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <title>平原サバイバー</title>
    <link rel="icon" href="data:," />
    <link rel="stylesheet" href="src/styles.css" />
  </head>
  <body>
    <main id="app" aria-label="平原サバイバー">
      <canvas id="game" aria-label="ゲーム画面"></canvas>

      <div id="vignette"></div>
      <div id="hitFlash"></div>

      <section id="hud" aria-live="polite">
        <div class="hud-block">
          <span class="hud-label">階層</span>
          <strong id="waveText">1</strong>
        </div>
        <div class="hud-block wide">
          <span class="hud-label">目的</span>
          <strong id="timeText">出口を探せ</strong>
        </div>
        <div class="hud-meter">
          <span class="hud-label">体力</span>
          <div id="heartMeter" class="heart-meter" aria-label="ハート"></div>
          <strong id="hpText" class="hp-text">3/3</strong>
        </div>
        <div class="hud-block">
          <span class="hud-label">ゴールド</span>
          <strong id="goldText">0</strong>
        </div>
        <div class="hud-block">
          <span class="hud-label">撃破</span>
          <strong id="killText">0</strong>
        </div>
      </section>

      <button id="pauseBtn" type="button" class="pause-button hidden" aria-label="一時停止">II</button>

      <section id="pauseMenu" class="panel narrow hidden" aria-label="一時停止メニュー">
        <span class="panel-kicker">一時停止</span>
        <h1>休憩中</h1>
        <div class="pause-actions">
          <button id="resumeBtn" type="button" class="primary">再開</button>
          <button id="pauseDebugBtn" type="button">デバッグメニュー</button>
          <button id="pauseRestartBtn" type="button">やり直す</button>
        </div>
      </section>

      <section id="starterPick" class="panel narrow hidden" aria-label="開始武器選択">
        <div class="panel-head">
          <div>
            <span class="panel-kicker">最初の武器</span>
            <h1>3つから1つ選んで平原へ</h1>
          </div>
        </div>
        <div id="starterOffers" class="starter-offers"></div>
      </section>

      <section id="shop" class="panel hidden" aria-label="装備整理">
        <div class="panel-head">
          <div>
            <span class="panel-kicker">安全地帯</span>
            <h1>アタッチメントを購入</h1>
          </div>
        </div>

        <div id="offers" class="offers"></div>
        <div id="gearInventory" class="gear-inventory"></div>
        <div class="shop-footer">
          <div class="shop-wallet">
            <span class="hud-label">所持ゴールド</span>
            <strong id="shopGoldText">0</strong>
          </div>
          <div class="shop-actions">
            <button id="shopRerollBtn" type="button">更新 無料</button>
            <button id="shopContinueBtn" type="button" class="primary">次の階層へ</button>
          </div>
        </div>
      </section>

      <section id="treasureReward" class="panel narrow hidden" aria-label="宝箱報酬">
        <div class="panel-head">
          <div>
            <span class="panel-kicker">宝箱</span>
            <h1>報酬を確認</h1>
          </div>
        </div>
        <article class="treasure-card">
          <span id="treasureRewardIcon" class="treasure-icon">W</span>
          <div class="treasure-copy">
            <strong id="treasureRewardName">武器</strong>
            <p id="treasureRewardText"></p>
            <small id="treasureRewardMeta"></small>
          </div>
        </article>
        <div class="treasure-actions">
          <button id="treasureRerollBtn" type="button">リロール 無料</button>
          <button id="treasureTakeBtn" type="button" class="primary">受け取る</button>
        </div>
      </section>

      <section id="gameOver" class="panel narrow hidden" aria-label="ゲームオーバー">
        <span class="panel-kicker">ラン終了</span>
        <h1>探索はここまで</h1>
        <p id="resultText"></p>
        <button id="restartBtn" type="button" class="primary">やり直す</button>
      </section>

      <div id="touchControls" aria-hidden="true">
        <div id="moveStick" class="stick">
          <div id="moveThumb" class="stick-thumb"></div>
        </div>
      </div>

      <aside id="debugPanel" class="hidden" aria-label="デバッグメニュー">
        <div class="debug-head">
          <strong>DEBUG</strong>
          <small>~ で開閉</small>
          <button id="dbgClose" type="button">閉じる</button>
        </div>
        <div class="debug-row">
          <label>武器</label>
          <select id="dbgWeaponSel"></select>
          <button id="dbgWeaponEquip" type="button">装備</button>
        </div>
        <div class="debug-row">
          <label>アタッチ</label>
          <select id="dbgAttSel"></select>
        </div>
        <div class="debug-row">
          <label>装備先</label>
          <select id="dbgAttWeapon"></select>
          <button id="dbgAttApply" type="button">装着</button>
        </div>
        <div class="debug-row">
          <label>敵</label>
          <select id="dbgEnemySel">
            <option value="walker">ゾンビ歩</option>
            <option value="runner">ゾンビ走</option>
            <option value="orc">オーク</option>
            <option value="archer">スケルトン</option>
          </select>
          <button id="dbgEnemySpawn" type="button">出現</button>
        </div>
        <div class="debug-row debug-actions">
          <button id="dbgHeal" type="button">回復</button>
          <button id="dbgKillAll" type="button">全滅</button>
          <button id="dbgInvuln" type="button">無敵 OFF</button>
        </div>
        <div class="debug-row debug-actions">
          <button id="dbgShop" type="button">ショップ</button>
          <button id="dbgNextWave" type="button">次夜</button>
        </div>
      </aside>
    </main>

    <script type="module" src="src/main.js"></script>
  </body>
</html>
